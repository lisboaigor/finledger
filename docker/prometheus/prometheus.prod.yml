global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  # Em produção o backend roda como container no mesmo compose — nome do
  # serviço resolve pela rede interna do compose (ao contrário do dev, onde
  # cargo run expõe em host.docker.internal). :9464 não é publicado no host
  # nem exposto pelo Caddy — só alcançável por outro container da mesma rede.
  - job_name: finledger
    static_configs:
      - targets: ["backend:9464"]
        labels:
          service: finledger-backend

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

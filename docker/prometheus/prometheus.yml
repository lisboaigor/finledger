global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  # Finledger backend runs on the host (cargo run), exposing metrics on :9464.
  - job_name: finledger
    static_configs:
      - targets: ["host.docker.internal:9464"]
        labels:
          service: finledger-backend

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # Host: CPU, memória, disco e rede. Em macOS os números são da VM do
  # Docker Desktop; em Linux (produção), do host de verdade.
  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]

  # Por container (cAdvisor).
  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]

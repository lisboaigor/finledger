# Métricas por container via API do Docker — imune ao storage driver do
# daemon (o cAdvisor quebra com containerd-snapshotter e removeu o suporte
# a Docker a partir da v0.53). CPU/memória/rede por container; disco é
# monitorado no nível do host pelo node_exporter.
[agent]
  interval = "10s"
  omit_hostname = true

[[inputs.docker]]
  endpoint = "unix:///var/run/docker.sock"
  # Só os agregados por container (sem série por CPU/por interface).
  perdevice_include = []
  total_include = ["cpu", "blkio", "network"]
  # Labels do compose virariam dezenas de tags vazias no Prometheus.
  docker_label_exclude = ["*"]

[[outputs.prometheus_client]]
  listen = ":9273"
  # Sem timestamps: o Prometheus usa o instante do scrape.
  export_timestamp = false

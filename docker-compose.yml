name: finledger

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: finledger
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./docker/postgres/seed_demo.sql:/docker-entrypoint-initdb.d/seed_demo.sql
      # y- roda após init.sql/seed; zz- após as migrações (ordem alfabética do initdb).
      - ./docker/postgres/migrations:/migrations
      - ./docker/postgres/apply-migrations.sh:/docker-entrypoint-initdb.d/y-migrations.sh
      - ./docker/postgres/bi.sql:/docker-entrypoint-initdb.d/zz-bi.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d finledger"]
      interval: 5s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:v3.4.1
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    # host.docker.internal resolves out of the box on Docker Desktop (macOS);
    # host-gateway makes the same name work on Linux engines.
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Métricas do host (CPU, RAM, disco, rede). Sem porta publicada: só o
  # Prometheus, na mesma rede do compose, raspa o :9100. Sem o bind do
  # rootfs (o mount `rslave` do prod não funciona no Docker Desktop/macOS):
  # os números aqui são da VM Linux do Docker, não do Mac — suficiente para
  # desenvolver o dashboard; em produção (Linux) refletem a VPS de verdade.
  node-exporter:
    image: prom/node-exporter:v1.9.1
    restart: unless-stopped

  # Métricas por container via API do Docker (CPU/RAM/rede de cada serviço
  # da stack) — é daqui que sai o consumo do processo do backend. Substitui
  # o cAdvisor, que perdeu o suporte a Docker (removido na v0.53; a v0.52
  # quebra com o storage containerd-snapshotter usado por engines novas).
  # user root + entrypoint direto: o entrypoint padrão da imagem rebaixa o
  # usuário e perde o acesso ao docker.sock.
  telegraf:
    image: telegraf:1.35-alpine
    user: root
    entrypoint: ["telegraf"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./docker/telegraf/telegraf.conf:/etc/telegraf/telegraf.conf:ro
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.6.1
    ports:
      # Grafana listens on 3000 internally; 3000/3001 are taken by the app.
      - "3002:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
